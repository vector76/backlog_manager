{{template "base" .}}
{{define "title"}}New Feature - {{.ProjectName}} - Backlog Manager{{end}}
{{define "content"}}
<h1>New Feature</h1>

<div class="card">
  <form method="POST" action="/project/{{.ProjectName}}/features">
    <div class="form-group">
      <label for="name">Feature name</label>
      <input type="text" id="name" name="name" required autofocus placeholder="Short descriptive name">
    </div>
    <div class="form-group">
      <label for="description">Description (Markdown)</label>
      <textarea id="description" name="description" placeholder="Describe the feature in detail..."></textarea>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" name="direct_to_bead" value="true">
        Direct to bead
      </label>
    </div>
    <div class="flex-row">
      {{if not .IsViewer}}<button type="submit" class="btn btn-primary">Create Feature</button>{{end}}
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{{end}}
